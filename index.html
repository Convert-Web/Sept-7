/* ============================================================

const WA = '33763676191';
const SAUCES  = ['Blanche','Algérienne','Harissa','BBQ','Ketchup','Samurai','Honey Mustard','Mayo'];
const VIANDES_RIZ = ['Kebab','Poulet Tandoori','Poulet Curry','Escalope de Poulet','Steak','Tenders','Nuggets','Cordon Bleu'];
const COMBOS_DRINK = ['Coca-Cola 33cl','Fanta Orange 33cl','Sprite 33cl','Oasis Tropical 33cl','Pepsi 33cl','7UP 33cl','Orangina 33cl','Lipton Ice Tea 33cl','Eau minérale 50cl'];

const TACOS_DATA = {

  sizes: [
    {id:'S1',label:'1 Viande',price:8.80,menu:11.50,color:'#E0141F'},
    {id:'S2',label:'2 Viandes',price:9.90,menu:13.00,color:'#d97706'},

  ],
  viandes: ['Kebab','Poulet Tandoori','Poulet Curry','Escalope de Poulet','Steak Haché','Tenders','Nuggets','Cordon Bleu'],
  sauces: ['Blanche','Algérienne','Harissa','BBQ','Ketchup','Samurai','Honey Mustard','Mayo','Sans sauce'],
  fromages: ['Gouda','Emmental','Mozzarella','Cheddar','Raclette','Sans fromage'],
  supps: [
    {id:'oe',label:'Œuf',price:.5},{id:'av',label:'Avocat',price:.8},{id:'bd',label:'Bacon Dinde',price:1},{id:'ch',label:'Champignons',price:.8},
    {id:'on',label:'Oignons Frits',price:.5},{id:'ja',label:'Jalapeños',price:.5},{id:'co',label:'Cornichons',price:.3},{id:'po',label:'Pommes de Terre',price:.7},
  ],
};

const PM_OPTS = {
  sauce: { label:'Sauce', items: SAUCES },
  combo: { label:'Boisson incluse', items: COMBOS_DRINK },
  drink: { label:'Boisson', items: COMBOS_DRINK },
};

/* ============================================================
   CART
   ============================================================ */
let cart = [];

function cartCount(){ return cart.reduce((s,i)=>s+i.qty,0); }
function cartTotal(){ return cart.reduce((s,i)=>s+i.price*i.qty,0); }

function addToCart(name, price, extra=''){
  const ex = cart.findIndex(i=>i.name===name && i.extra===extra);
  if(ex>-1){ cart[ex].qty++; } else { cart.push({name,price,extra,qty:1}); }
  renderCart(); showToast(`✅ ${name} ajouté au panier`); updateBadges();
  if(!document.getElementById('cart-panel').classList.contains('open')) bumpCart();
}

function bumpCart(){
  const btn = document.querySelector('.nav-cart-btn');
  if(btn){ btn.style.animation='cartBounce .4s ease'; setTimeout(()=>btn.style.animation='',450); }
}

function changeQty(idx,d){
  cart[idx].qty = Math.max(0, cart[idx].qty + d);
  if(cart[idx].qty===0) cart.splice(idx,1);
  renderCart(); updateBadges();
}

function removeItem(idx){ cart.splice(idx,1); renderCart(); updateBadges(); }

function renderCart(){
  const list = document.getElementById('cart-list');
  const hcnt = document.getElementById('cart-hcount');
  const tot  = document.getElementById('cart-total');
  const ob   = document.getElementById('cart-order-btn');
  const count= cartCount();
  hcnt.textContent = count===0 ? '0 article' : `${count} article${count>1?'s':''}`;
  tot.textContent  = cartTotal().toFixed(2).replace('.',',')+'€';
  if(cart.length===0){
    list.innerHTML='<div class="cart-empty"><span style="font-size:2.5rem;opacity:.4">🛒</span><span>Votre panier est vide</span><span style="font-size:.7rem;color:var(--muted)">Ajoutez des produits depuis la carte</span></div>';
    ob.style.display='none';
  } else {
    list.innerHTML = cart.map((it,i)=>`
      <div class="cart-item">
        <div class="cart-item-info">
          <div class="cart-item-name">${it.name}</div>
          ${it.extra?`<div class="cart-item-unit">${it.extra}</div>`:''}
          <div class="cart-item-unit">${it.price.toFixed(2).replace('.',',')}€/u</div>
        </div>
        <div class="qty-ctrl">
          <button class="qty-btn" onclick="changeQty(${i},-1)" aria-label="Diminuer">−</button>
          <div class="qty-num">${it.qty}</div>
          <button class="qty-btn" onclick="changeQty(${i},1)" aria-label="Augmenter">+</button>
        </div>
        <div class="cart-item-sub">${(it.price*it.qty).toFixed(2).replace('.',',')}€</div>
        <button class="cart-del" onclick="removeItem(${i})" aria-label="Supprimer">✕</button>
      </div>`).join('');
    ob.style.display='flex';
  }
}

function updateBadges(){
  const c = cartCount();
  const showBadge = c > 0;
  const nb = document.getElementById('nav-cnt');
  const fb = document.getElementById('fcta-cnt');
  const mc = document.getElementById('mob-cnt');
  nb.textContent = c; nb.classList.toggle('show', showBadge);
  fb.textContent = c; fb.classList.toggle('show', showBadge);
  if(mc){ mc.textContent=c; mc.style.display = showBadge?'inline':'none'; }
  document.getElementById('fcta').classList.toggle('vis', c > 0 && window.scrollY > 300);
}

function openCart(){ document.getElementById('cart-overlay').classList.add('open'); document.getElementById('cart-panel').classList.add('open'); document.body.style.overflow='hidden'; }
function closeCart(){ document.getElementById('cart-overlay').classList.remove('open'); document.getElementById('cart-panel').classList.remove('open'); document.body.style.overflow=''; }

/* ============================================================
   ORDER FORM
   ============================================================ */
function openOrderForm(){
  if(cart.length===0){ showToast('⚠️ Votre panier est vide'); return; }
  const sum = document.getElementById('modal-sum');
  const lines = cart.map(i=>`${i.qty}x ${i.name}${i.extra?' ('+i.extra+')':''} — ${(i.price*i.qty).toFixed(2).replace('.',',')}€`).join('<br>');
  sum.innerHTML = `<strong>🛒 Récapitulatif (${cartCount()} article${cartCount()>1?'s':''})</strong>${lines}<br><br><strong>Total : ${cartTotal().toFixed(2).replace('.',',')}€</strong>`;
  document.getElementById('order-modal').classList.add('open');
  document.body.style.overflow='hidden';
}

function closeOrderForm(){ document.getElementById('order-modal').classList.remove('open'); document.body.style.overflow=''; }

function submitOrder(){
  const name  = document.getElementById('f-name').value.trim();
  const phone = document.getElementById('f-phone').value.trim();
  const type  = document.getElementById('f-type').value;
  const time  = document.getElementById('f-time').value;
  if(!name||!type){ showToast('⚠️ Veuillez remplir tous les champs'); return; }
  let msg = `🍔 *Nouvelle commande – Le Sept 7*\n\n`;
  msg += `👤 *Nom:* ${name}\n`;
  if(phone) msg += `📞 *Tel:* ${phone}\n`;
  msg += `📋 *Type:* ${type}\n`;
  if(time) msg += `🕐 *Heure:* ${time}\n`;
  msg += `\n*Commande:*\n`;
  cart.forEach(i=>{ msg += `▸ ${i.qty}x ${i.name}${i.extra?' ('+i.extra+')':''} — ${(i.price*i.qty).toFixed(2).replace('.',',')}€\n`; });
  msg += `\n💰 *Total: ${cartTotal().toFixed(2).replace('.',',')}€*\n_(Paiement sur place)_`;
  window.open(`https://wa.me/${WA}?text=${encodeURIComponent(msg)}`,'_blank');
  cart = []; renderCart(); updateBadges(); closeOrderForm(); closeCart();
  showToast('✅ Commande envoyée sur WhatsApp !');
}

/* ============================================================
   TOAST
   ============================================================ */
let toastTimer;
function showToast(msg){
  const t = document.getElementById('toast');
  t.innerHTML = msg; t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>t.classList.remove('show'), 2800);
}

/* ============================================================
   BANNER
   ============================================================ */
function dismissBanner(){
  document.getElementById('urgency').classList.add('hidden');
  document.body.classList.add('no-banner');
  document.getElementById('nav').style.top='0';
  document.getElementById('hero').style.paddingTop='var(--nh)';
}

/* ============================================================
   STATUS CHECK
   ============================================================ */
function checkStatus(){
  const now = new Date();
  const h = now.getHours();
  const m = now.getMinutes();
  const mins = h*60 + m;
  const openMin = 11*60, closeMin = 23*60;
  const isOpen = mins >= openMin && mins < closeMin;
  const dot = document.getElementById('status-dot');
  const txt = document.getElementById('status-txt');
  const bm  = document.getElementById('banner-msg');
  const bp  = document.querySelector('.banner-pulse');
  if(dot){ dot.className='sdot '+(isOpen?'open':'closed'); }
  if(txt){ txt.textContent = isOpen ? '🟢 Ouvert maintenant · Ferme à 23h00' : '🔴 Fermé actuellement · Ouvre à 11h00'; }
  if(bm && bp){
    if(isOpen){
      const remaining = closeMin - mins;
      if(remaining <= 60){
        bm.textContent = `⏳ Ferme dans ${remaining} min — Commandez maintenant !`;
        bp.style.background='var(--yellow)';
      } else {
        bm.textContent = '🔥 Ouvert maintenant — Commande prête en 10 min';
        bp.style.background='var(--green)';
      }
    } else {
      bm.textContent = '🔴 Fermé · Ouvre demain à 11h00';
      bp.style.background='var(--red)';
    }
  }
}

   LIVE ORDER COUNTER
   ============================================================ */
function updateLiveCounter(){
  const el = document.getElementById('live-txt');
  if(!el) return;
  const base = 8;
  const n = base + Math.floor(Math.random()*18);
  el.textContent = `🔥 ${n} personnes en train de commander`;
  el.closest('.hero-live') && (el.closest('.hero-live').style.animation='livePop .4s ease both');
  setTimeout(()=>{ if(el.closest('.hero-live')) el.closest('.hero-live').style.animation=''; },450);
}

/* ============================================================
   MENU SEARCH
   ============================================================ */
function searchMenu(query){
  const q = query.toLowerCase().trim();
  const panels = document.querySelectorAll('.panel');
  if(!q){ panels.forEach(p=>{ p.querySelectorAll('.mcard').forEach(c=>c.style.display=''); }); return; }
  // search across all panels
  let found = false;
  panels.forEach(p=>{
    p.querySelectorAll('.mcard').forEach(card=>{
      const name = (card.querySelector('.mcard-name')||{}).textContent||'';
      const desc = (card.querySelector('.mcard-desc')||{}).textContent||'';
      const match = (name+' '+desc).toLowerCase().includes(q);
      card.style.display = match ? '' : 'none';
      if(match) found=true;
    });
  });
  // show first tab that has visible results
  if(q){
    let switched=false;
    panels.forEach(p=>{
      const visible = [...p.querySelectorAll('.mcard')].some(c=>c.style.display!=='none');
      if(visible && !switched){
        const tabId = p.id;
        const tab = document.querySelector(`[onclick*="${tabId}"]`);
        if(tab){ document.querySelectorAll('.tab').forEach(t=>{t.classList.remove('on');t.setAttribute('aria-selected','false');}); tab.classList.add('on');tab.setAttribute('aria-selected','true'); }
        document.querySelectorAll('.panel').forEach(pp=>pp.classList.remove('on'));
        p.classList.add('on');
        switched=true;
      }
    });
  }
}

   REVIEW TABS

  btn.classList.add(src==='google'?'active':'active-ue');
  btn.setAttribute('aria-selected','true');
  document.getElementById('rv-'+src).classList.add('active');
}

function switchTab(btn, panelId){
  document.querySelectorAll('.tab').forEach(t=>{t.classList.remove('on');t.setAttribute('aria-selected','false');});

  const si = document.getElementById('menu-search');
  if(si && si.value){ si.value=''; searchMenu(''); }

/* ============================================================

const tacos = { step:0, size:null, viandes:[], sauces:[], fromages:[], supps:[], isMenu:false };

function openTacosModal(){ Object.assign(tacos,{step:0,size:null,viandes:[],sauces:[],fromages:[],supps:[],isMenu:false}); renderTacos(); document.getElementById('tacos-modal').classList.add('open'); document.body.style.overflow='hidden'; }
function closeTacosModal(){ document.getElementById('tacos-modal').classList.remove('open'); document.body.style.overflow=''; }

function tacosPrice(){
  if(!tacos.size) return 0;
  const base = tacos.isMenu ? tacos.size.menu : tacos.size.price;
  const suppTotal = tacos.supps.reduce((s,id)=>{ const f=TACOS_DATA.supps.find(x=>x.id===id); return s+(f?f.price:0); },0);
  return base + suppTotal;
}

function renderTacos(){
  const s = tacos.step;
  renderTacosProgress();
  renderTacosPanel();
  updateTacosPrice();
  document.getElementById('tacos-prev').style.visibility = s===0?'hidden':'visible';
  const nb = document.getElementById('tacos-next');
  if(s===TACOS_DATA.steps.length-1){ nb.textContent='🛒 Ajouter au panier'; nb.onclick=tacosAddToCart; }

function renderTacosPanel(){

        <div class="size-card-price">${sz.price.toFixed(2).replace('.',',')}€ · Menu ${sz.menu.toFixed(2).replace('.',',')}€</div>
      </div>`).join('')}</div>
      <div style="margin-top:14px;display:flex;align-items:center;gap:9px;padding:12px 14px;border:1px solid var(--border);border-radius:7px;cursor:pointer" onclick="tacos.isMenu=!tacos.isMenu;renderTacos()">
        <div style="width:20px;height:20px;border-radius:4px;background:${tacos.isMenu?'var(--green)':'var(--border)'};display:flex;align-items:center;justify-content:center;font-size:.75rem;transition:background .2s">${tacos.isMenu?'✓':''}</div>
        <span style="font-size:.82rem;font-weight:600">Menu (+Frites &amp; Boisson)</span>
        ${tacos.size?`<span style="font-size:.78rem;color:var(--yellow);margin-left:auto">+${(TACOS_DATA.sizes.find(z=>z.id===tacos.size).menu - TACOS_DATA.sizes.find(z=>z.id===tacos.size).price).toFixed(2).replace('.',',')}€</span>`:''}
      </div>
    </div>`;
  } else if(s===1){
    const maxV = parseInt(tacos.size?.replace('S','')||1);
    content.innerHTML=`<div class="tacos-panel active"><p class="step-info">Choisissez <strong>${maxV} viande${maxV>1?'s':''}</strong> (${tacos.viandes.length}/${maxV} sélectionnée${maxV>1?'s':''})</p><div class="opts-grid">${TACOS_DATA.viandes.map(v=>{const sel=tacos.viandes.includes(v);const dis=!sel&&tacos.viandes.length>=maxV;return`<div class="opt-chip ${sel?'selected':''} ${dis?'disabled':''}" onclick="tacosToggleViande('${v}')"><span class="chip-chk">✓</span>${v}</div>`}).join('')}</div></div>`;
  } else if(s===2){
    content.innerHTML=`<div class="tacos-panel active"><p class="step-info">Choisissez votre <strong>sauce</strong> (jusqu'à 2)</p><div class="opts-grid">${TACOS_DATA.sauces.map(sc=>{const sel=tacos.sauces.includes(sc);const dis=!sel&&tacos.sauces.length>=2;return`<div class="opt-chip ${sel?'selected':''} ${dis?'disabled':''}" onclick="tacosToggleSauce('${sc}')"><span class="chip-chk">✓</span>${sc}</div>`}).join('')}</div></div>`;
  } else if(s===3){
    content.innerHTML=`<div class="tacos-panel active"><p class="step-info">Choisissez votre <strong>fromage</strong> (optionnel)</p><div class="opts-grid">${TACOS_DATA.fromages.map(fr=>{const sel=tacos.fromages.includes(fr);return`<div class="opt-chip ${sel?'selected':''}" onclick="tacosToggleFromage('${fr}')"><span class="chip-chk">✓</span>${fr}</div>`}).join('')}</div></div>`;
  } else if(s===4){
    content.innerHTML=`<div class="tacos-panel active"><p class="step-info">Ajoutez des <strong>suppléments</strong> (optionnel)</p><div class="supp-grid">${TACOS_DATA.supps.map(sp=>{const sel=tacos.supps.includes(sp.id);return`<div class="supp-chip ${sel?'selected':''}" onclick="tacosToggleSupp('${sp.id}')"><div class="supp-left"><div class="supp-chk">${sel?'✓':''}</div><span class="supp-name">${sp.label}</span></div><span class="supp-price">+${sp.price.toFixed(2).replace('.',',')}€</span></div>`}).join('')}</div></div>`;
  } else if(s===5){
    const sz = TACOS_DATA.sizes.find(z=>z.id===tacos.size);
    content.innerHTML=`<div class="tacos-panel active"><div class="sum-box">
      <div class="sum-row"><span class="sum-lbl">Taille</span><span class="sum-val">${sz?.label||'—'}</span></div>
      <div class="sum-row"><span class="sum-lbl">Viandes</span><span class="sum-val">${tacos.viandes.join(', ')||'Aucune'}</span></div>
      <div class="sum-row"><span class="sum-lbl">Sauces</span><span class="sum-val">${tacos.sauces.join(', ')||'Aucune'}</span></div>
      <div class="sum-row"><span class="sum-lbl">Fromage</span><span class="sum-val">${tacos.fromages.join(', ')||'Aucun'}</span></div>
      ${tacos.supps.length?`<div class="sum-row"><span class="sum-lbl">Suppléments</span><span class="sum-val">${tacos.supps.map(id=>TACOS_DATA.supps.find(x=>x.id===id)?.label).join(', ')}</span></div>`:''}
      ${tacos.isMenu?'<div class="sum-row"><span class="sum-lbl">Menu</span><span class="sum-val" style="color:var(--green)">✓ Frites + Boisson incluses</span></div>':''}
      <div class="sum-total"><span class="sum-total-lbl">Total</span><span class="sum-total-val">${tacosPrice().toFixed(2).replace('.',',')}€</span></div>
    </div></div>`;
  }
}

function tacosSelectSize(id){ tacos.size=id; renderTacos(); }
function tacosToggleViande(v){ const max=parseInt(tacos.size?.replace('S','')||1); const i=tacos.viandes.indexOf(v); if(i>-1){tacos.viandes.splice(i,1);}else if(tacos.viandes.length<max){tacos.viandes.push(v);} renderTacos(); }
function tacosToggleSauce(sc){ const i=tacos.sauces.indexOf(sc); if(i>-1){tacos.sauces.splice(i,1);}else if(tacos.sauces.length<2){tacos.sauces.push(sc);} renderTacos(); }
function tacosToggleFromage(fr){ tacos.fromages=tacos.fromages.includes(fr)?tacos.fromages.filter(x=>x!==fr):[fr]; renderTacos(); }
function tacosToggleSupp(id){ const i=tacos.supps.indexOf(id); if(i>-1){tacos.supps.splice(i,1);}else{tacos.supps.push(id);} renderTacos(); }

function tacosNext(){
  if(tacos.step===0 && !tacos.size){ showToast('⚠️ Choisissez une taille'); return; }
  if(tacos.step===1){ const max=parseInt(tacos.size?.replace('S','')||1); if(tacos.viandes.length<max){ showToast(`⚠️ Choisissez ${max} viande${max>1?'s':''}`); return; } }
  if(tacos.step===2 && tacos.sauces.length===0){ showToast('⚠️ Choisissez au moins une sauce'); return; }
  if(tacos.step < TACOS_DATA.steps.length-1){ tacos.step++; renderTacos(); }
}

function tacosPrev(){ if(tacos.step>0){ tacos.step--; renderTacos(); } }

function updateTacosPrice(){ const el=document.getElementById('tacos-price'); if(el){ el.textContent=tacosPrice().toFixed(2).replace('.',',')+'€'; } }

function tacosAddToCart(){
  if(!tacos.size){ showToast('⚠️ Veuillez compléter votre tacos'); return; }
  const sz = TACOS_DATA.sizes.find(z=>z.id===tacos.size);
  const extra = [tacos.viandes.join(', '), tacos.sauces.join(', '), tacos.fromages.join(', '), tacos.isMenu?'Menu':''].filter(Boolean).join(' | ');
  addToCart(`Tacos ${sz.label}${tacos.isMenu?' (Menu)':''}`, tacosPrice(), extra);
  closeTacosModal();
}

/* ============================================================
   PRODUCT MODAL
   ============================================================ */
let pm = { name:'', basePrice:0, type:'', choice:'', finalPrice:0 };

function openProductModal(item){
  pm = { name:item.name, basePrice:item.price, type:item.type||'sauce', choice:'', finalPrice:item.price };
  document.getElementById('pm-name').textContent = item.name;
  const opts = PM_OPTS[item.type] || PM_OPTS['sauce'];
  document.getElementById('pm-hint').textContent = `Choisissez : ${opts.label}`;
  document.getElementById('pm-body').innerHTML = `
    <div class="pm-slbl">${opts.label}</div>
    <div class="opts-grid">${opts.items.map(it=>`<div class="opt-chip" onclick="pmSelect(this,'${it.replace(/'/g,"\\'")}')"><span class="chip-chk">✓</span>${it}</div>`).join('')}</div>`;
  document.getElementById('pm-price').textContent = pm.basePrice.toFixed(2).replace('.',',')+'€';
  document.getElementById('product-modal').classList.add('open');
  document.body.style.overflow='hidden';
}

function pmSelect(el, val){
  document.querySelectorAll('#pm-body .opt-chip').forEach(c=>c.classList.remove('selected'));
  el.classList.add('selected');
  pm.choice = val;
}

function confirmPModal(){
  addToCart(pm.name, pm.basePrice, pm.choice||'');
  document.getElementById('product-modal').classList.remove('open');
  document.body.style.overflow='';
}

function closePModal(){ document.getElementById('product-modal').classList.remove('open'); document.body.style.overflow=''; }

/* ============================================================
   RIZ MODAL
   ============================================================ */
let riz = { name:'', price:0, max:1, selected:[] };

function openRizModal(max, name, price){
  riz = { name, price, max, selected:[] };
  document.getElementById('riz-name').textContent = name;
  document.getElementById('riz-hint').textContent = `Choisissez ${max} viande${max>1?'s':''}`;
  document.getElementById('riz-price').textContent = price.toFixed(2).replace('.',',')+'€';
  renderRizBody();
  document.getElementById('riz-modal').classList.add('open');
  document.body.style.overflow='hidden';
}

function renderRizBody(){
  document.getElementById('riz-body').innerHTML = `
    <div class="pm-slbl">Viandes (${riz.selected.length}/${riz.max})</div>
    <div class="opts-grid">${VIANDES_RIZ.map(v=>{const sel=riz.selected.includes(v);const dis=!sel&&riz.selected.length>=riz.max;return`<div class="opt-chip ${sel?'selected':''} ${dis?'disabled':''}" onclick="rizSelect('${v}')"><span class="chip-chk">✓</span>${v}</div>`}).join('')}</div>`;
}

function rizSelect(v){ const i=riz.selected.indexOf(v); if(i>-1){riz.selected.splice(i,1);}else if(riz.selected.length<riz.max){riz.selected.push(v);} renderRizBody(); }
function confirmRizModal(){ if(riz.selected.length===0){showToast('⚠️ Choisissez au moins une viande');return;} addToCart(riz.name, riz.price, riz.selected.join(', ')); closeRizModal(); }
function closeRizModal(){ document.getElementById('riz-modal').classList.remove('open'); document.body.style.overflow=''; }

/* ============================================================
   NAVIGATION
   ============================================================ */
const nav = document.getElementById('nav');
window.addEventListener('scroll',()=>{
  nav.classList.toggle('scrolled', window.scrollY>60);
  document.getElementById('fcta').classList.toggle('vis', cartCount()>0 && window.scrollY>300);
  updateProgress();
},{ passive:true });

function updateProgress(){
  const total = document.body.scrollHeight - window.innerHeight;
  const pct = total > 0 ? (window.scrollY/total)*100 : 0;
  document.getElementById('prog').style.width = pct+'%';
}

/* ============================================================
   HAMBURGER
   ============================================================ */
const ham = document.getElementById('ham');
const mobMenu = document.getElementById('mobMenu');
function closeMenu(){ ham.classList.remove('open'); mobMenu.classList.remove('open'); ham.setAttribute('aria-expanded','false'); document.body.style.overflow=''; }
ham.addEventListener('click',()=>{
  const open = ham.classList.toggle('open');
  mobMenu.classList.toggle('open', open);
  ham.setAttribute('aria-expanded', open);
  document.body.style.overflow = open ? 'hidden' : '';
});

/* ============================================================
   LIGHTBOX
   ============================================================ */
function openLightbox(src){ document.getElementById('lb-img').src=src; document.getElementById('lightbox').classList.add('open'); }
function closeLightbox(){ document.getElementById('lightbox').classList.remove('open'); document.getElementById('lb-img').src='data:,'; }
document.addEventListener('keydown',e=>{ if(e.key==='Escape'){ closeCart(); closeOrderForm(); closeTacosModal(); closePModal(); closeRizModal(); closeLightbox(); closeMenu(); } });

/* ============================================================
   SCROLL REVEAL
   ============================================================ */
const revObs = new IntersectionObserver((entries)=>{
  entries.forEach(e=>{ if(e.isIntersecting){ e.target.classList.add('in'); revObs.unobserve(e.target); } });
},{ threshold:0.08, rootMargin:'0px 0px -30px 0px' });
document.querySelectorAll('.rev').forEach(el=>revObs.observe(el));

/* ============================================================
   INIT
   ============================================================ */
window.addEventListener('load', ()=>{
  setTimeout(()=>{ document.getElementById('loader').classList.add('gone'); }, 1600);
  checkStatus();
  setInterval(checkStatus, 60000);
  renderCart();
  updateBadges();
  updateLiveCounter();
  setInterval(updateLiveCounter, 28000);
  updateReviewDate();
});
</script>
</body>
</html>
